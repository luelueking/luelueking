<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pageGlow" cx="50%" cy="0%" r="82%">
      <stop offset="0" stop-color="#7c4a29" stop-opacity="0.14"/>
      <stop offset="0.46" stop-color="#1a1714" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#090909" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="windowStroke" x1="120" y1="58" x2="1080" y2="562" gradientUnits="userSpaceOnUse">
      <stop stop-color="#40372f"/>
      <stop offset="0.5" stop-color="#292725"/>
      <stop offset="1" stop-color="#503923"/>
    </linearGradient>
    <linearGradient id="avatarGlow" x1="360" y1="132" x2="442" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#29231c"/>
      <stop offset="1" stop-color="#171513"/>
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <clipPath id="cmdClip">
      <rect x="278" y="256" width="0" height="30">
        <animate attributeName="width" values="0;0;82;82" keyTimes="0;0.08;0.2;1" dur="10s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="line1Clip">
      <rect x="244" y="304" width="0" height="28">
        <animate attributeName="width" values="0;0;315;315" keyTimes="0;0.24;0.38;1" dur="10s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="line2Clip">
      <rect x="244" y="336" width="0" height="28">
        <animate attributeName="width" values="0;0;462;462" keyTimes="0;0.38;0.54;1" dur="10s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="line3Clip">
      <rect x="244" y="368" width="0" height="28">
        <animate attributeName="width" values="0;0;360;360" keyTimes="0;0.52;0.66;1" dur="10s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="line4Clip">
      <rect x="244" y="400" width="0" height="28">
        <animate attributeName="width" values="0;0;430;430" keyTimes="0;0.64;0.8;1" dur="10s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="line5Clip">
      <rect x="244" y="432" width="0" height="28">
        <animate attributeName="width" values="0;0;330;330" keyTimes="0;0.76;0.92;1" dur="10s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, Menlo, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .page { fill: #090909; }
      .window { fill: #111111; }
      .bar { fill: #171717; }
      .card { fill: #0c0c0c; }
      .text { fill: #e8e2d8; }
      .muted { fill: #8d867d; }
      .soft { fill: #b8afa4; }
      .accent { fill: #d08a55; }
      .accentDim { fill: #93603b; }
      .ready { fill: #8fd694; }
      .yellow { fill: #f6cf57; }
      .yellowDark { fill: #c99135; }
      .ink { fill: #2a2119; }
      .cheek { fill: #e7695f; }
      .small { font-size: 15px; }
      .tiny { font-size: 13px; letter-spacing: .2px; }
      .body { font-size: 17px; }
      .title { font-size: 27px; font-weight: 650; }
      .prompt { font-size: 18px; }
    </style>
  </defs>

  <rect width="1200" height="620" rx="30" class="page"/>
  <rect width="1200" height="620" rx="30" fill="url(#pageGlow)"/>

  <g filter="url(#softShadow)">
    <rect x="120" y="58" width="960" height="504" rx="20" class="window" stroke="url(#windowStroke)" stroke-width="1.2"/>
    <path d="M120 82C120 68.7452 130.745 58 144 58H1056C1069.25 58 1080 68.7452 1080 82V104H120V82Z" class="bar"/>
    <circle cx="148" cy="82" r="5.5" fill="#ff5f57"/>
    <circle cx="169" cy="82" r="5.5" fill="#febc2e"/>
    <circle cx="190" cy="82" r="5.5" fill="#28c840"/>
    <text x="600" y="87" text-anchor="middle" class="mono tiny muted">1ue-code</text>

    <rect x="334" y="132" width="86" height="86" rx="18" fill="url(#avatarGlow)" stroke="#2a2724"/>
    <g transform="translate(353 150) scale(2.22)" shape-rendering="crispEdges">
      <rect x="2" y="0" width="3" height="7" class="ink"/>
      <rect x="5" y="5" width="3" height="5" class="yellow"/>
      <rect x="21" y="0" width="3" height="7" class="ink"/>
      <rect x="18" y="5" width="3" height="5" class="yellow"/>
      <rect x="8" y="7" width="10" height="3" class="yellow"/>
      <rect x="6" y="10" width="15" height="4" class="yellow"/>
      <rect x="5" y="14" width="17" height="8" class="yellow"/>
      <rect x="7" y="22" width="13" height="3" class="yellowDark"/>
      <rect x="8" y="13" width="3" height="3" class="ink"/>
      <rect x="17" y="13" width="3" height="3" class="ink"/>
      <rect x="12" y="17" width="4" height="2" class="ink"/>
      <rect x="6" y="17" width="3" height="3" class="cheek"/>
      <rect x="20" y="17" width="3" height="3" class="cheek"/>
      <rect x="1" y="15" width="4" height="3" class="yellow"/>
      <rect x="22" y="15" width="4" height="3" class="yellow"/>
      <rect x="25" y="10" width="4" height="3" class="yellowDark"/>
      <rect x="29" y="7" width="3" height="3" class="yellow"/>
      <rect x="32" y="4" width="3" height="3" class="ink"/>
    </g>

    <text x="638" y="163" text-anchor="middle" class="sans title text">Welcome to 1ue Code</text>
    <text x="638" y="198" text-anchor="middle" class="sans small muted">Research workspace for reproducible impact.</text>

    <rect x="214" y="242" width="772" height="246" rx="14" class="card" stroke="#24211f"/>
    <text x="244" y="280" class="mono prompt">
      <tspan class="accentDim">❯</tspan>
    </text>
    <text x="278" y="280" class="mono prompt text" clip-path="url(#cmdClip)">/about</text>
    <text x="356" y="280" class="mono prompt accent">▌
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.48;0.5;0.96;1" dur="1s" repeatCount="indefinite"/>
    </text>

    <g class="mono body">
      <text x="244" y="326" class="text" clip-path="url(#line1Clip)">
        <tspan class="muted">handle</tspan><tspan>    1ue</tspan>
      </text>
      <text x="244" y="358" class="text" clip-path="url(#line2Clip)">
        <tspan class="muted">team</tspan><tspan>      Vidar-Team · El3ctronic</tspan>
      </text>
      <text x="244" y="390" class="text" clip-path="url(#line3Clip)">
        <tspan class="muted">h1</tspan><tspan>        hackerone.com/1ue</tspan>
      </text>
      <text x="244" y="422" class="text" clip-path="url(#line4Clip)">
        <tspan class="muted">talk</tspan><tspan>      Black Hat Asia 2026 · CAST Attack</tspan>
      </text>
      <text x="244" y="454" class="text" clip-path="url(#line5Clip)">
        <tspan class="muted">mode</tspan><tspan>      no guess. only proof.</tspan>
      </text>
    </g>

    <text x="214" y="540" class="mono tiny muted">/status for environment · enter to verify impact</text>
    <text x="986" y="540" text-anchor="end" class="mono tiny ready">ready</text>
  </g>
</svg>
